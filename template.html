<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>{{TITLE}}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { background: white; padding: 40px; max-width: 800px; margin: auto; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; }
        .content { line-height: 1.8; color: #333; font-size: 18px; }
        .date { color: #888; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{TITLE}}</h1>
        <div class="date">تاريخ النشر: {{DATE}}</div>
        <div class="content">{{CONTENT}}</div>
    </div>
</body>
</html>
