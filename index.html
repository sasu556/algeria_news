<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نبض الجزائر | آخر الأخبار</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="logo">
    <span class="logo-dot"></span>
    <span class="logo-text">نبض <b>الجزائر</b></span>
  </div>
  <div class="header-date" id="hDate"></div>
</header>

<section class="hero">
  <div class="deco d1"></div><div class="deco d2"></div><div class="deco d3"></div>
  <div class="hero-label">📰 آخر الأخبار</div>
  <h1>اطّلع على أحدث<br><span>الأحداث والأخبار</span></h1>
  <p>تابع كل ما يهمك من أخبار محلية وعالمية بشكل يومي</p>
</section>

<main class="main">
  <div class="filter-bar">
    <span class="filter-label">تصفية حسب:</span>
    <div class="filter-btns" id="filterBtns">
      <button class="fbtn active" data-cat="all">الكل</button>
    </div>
  </div>

  <div class="grid" id="newsGrid"></div>

  <div class="state" id="stateLoading">
    <div class="spinner"></div>
    <p>جارٍ تحميل الأخبار…</p>
  </div>
  <div class="state hidden" id="stateError">
    <div class="state-icon">⚠️</div>
    <h3>تعذّر تحميل الأخبار</h3>
    <p id="errMsg">حدث خطأ أثناء جلب البيانات.</p>
    <button class="retry-btn" onclick="loadNews()">إعادة المحاولة</button>
  </div>
  <div class="state hidden" id="stateEmpty">
    <div class="state-icon">🗞️</div>
    <h3>لا توجد أخبار</h3>
    <p>لم يتم العثور على أي مقالات في هذا التصنيف.</p>
  </div>
</main>

<footer>
  <div class="footer-logo">نبض <b>الجزائر</b></div>
  <div class="footer-copy">© <span id="fYear"></span> جميع الحقوق محفوظة</div>
</footer>

<script src="js/news.js"></script>
</body>
</html>
