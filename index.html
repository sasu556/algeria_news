<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار الجزائر اليوم - الصفحة الرئيسية</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 0; 
            color: #333; 
        }
        header { 
            background-color: #004d40; 
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        header h1 { margin: 0; font-size: 36px; }
        header p { margin: 10px 0 0 0; font-size: 18px; opacity: 0.9; }
        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }
        .section-title {
            border-bottom: 3px solid #004d40;
            padding-bottom: 10px;
            color: #222;
        }
        .news-item { 
            background: white; 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
            margin-bottom: 25px; 
            border-right: 6px solid #004d40; 
            transition: transform 0.2s;
        }
        .news-item:hover {
            transform: translateY(-5px);
        }
        .news-item a { 
            text-decoration: none; 
            color: #004d40; 
            font-size: 24px; 
            font-weight: bold; 
        }
        .news-item a:hover { color: #00796b; }
        .date { 
            color: #777; 
            font-size: 14px; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <header>
        <h1>أخبار الجزائر اليوم</h1>
        <p>تغطية شاملة ومستمرة لآخر الأحداث</p>
    </header>

    <div class="container">
        <h2 class="section-title">آخر الأخبار</h2>
        
        </div>

</body>
</html>
